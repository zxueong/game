<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>珍奶大亨 2.0 - 手機優化版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5efe6;
            color: #4a3f35;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .game-container {
            width: 100%;
            max-width: 650px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: #8c6239; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #b1977a; margin-bottom: 25px; font-size: 14px; }

        /* 排行榜區塊 */
        .leaderboard {
            background-color: #f8f9fa;
            border: 1px dashed #ccc;
            border-radius: 10px;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .leaderboard h3 { margin: 0 0 5px 0; color: #6c757d; display: flex; justify-content: space-between;}

        /* 儀表板 */
        .dashboard {
            background-color: #fff9f2;
            border: 2px solid #e1d3c1;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 25px;
        }
        .stat-box h3 { margin: 0; font-size: 14px; color: #8c6239; }
        .stat-box p { margin: 5px 0 0 0; font-size: 24px; font-weight: bold; color: #d4a373; }

        /* 主要動作區 */
        .action-section { text-align: center; margin-bottom: 30px; }
        
        .main-btn {
            background-color: #8c6239; color: white; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.1s, background-color 0.2s;
            
            /* 💡 優化：強制手機瀏覽器忽略「雙擊放大」手勢，點擊反應更靈敏 */
            touch-action: manipulation; 
        }
        .main-btn:hover { background-color: #734d2a; }
        .main-btn:active { transform: scale(0.95); }

        /* 升級面板 */
        .panel-title { font-size: 18px; font-weight: bold; border-bottom: 2px solid #e1d3c1; padding-bottom: 5px; margin-bottom: 15px; color: #634832; }
        .upgrade-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #faf8f5; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee;
        }
        .upgrade-info h4 { margin: 0; font-size: 16px; color: #4a3f35; }
        .upgrade-info p { margin: 3px 0 0 0; font-size: 12px; color: #888; }
        
        .premium { border: 1px solid #ffe3a8; background: #fffdf9; }
        .premium h4 { color: #b7791f; }

        .upgrade-btn {
            background-color: #e6ccb2; color: #4a3f35; border: none; padding: 8px 15px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s;
            /* 讓升級按鈕也防止誤觸放大 */
            touch-action: manipulation; 
        }
        .upgrade-btn:hover:not(:disabled) { background-color: #ddb892; }
        .upgrade-btn:disabled { background-color: #e0e0e0; color: #a0a0a0; cursor: not-allowed; }

        #log-msg { text-align: center; color: #7f5539; font-weight: bold; height: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🧋 珍奶大亨 2.0</h1>
    <div class="subtitle">企業擴張與在地榮譽榜 (手機流暢版)</div>

    <div class="leaderboard">
        <h3>🏆 本店歷史最高紀錄 <button onclick="resetHighScore()" style="font-size:10px; cursor:pointer;">重設</button></h3>
        <div>最高總資產紀錄：$<span id="high-score">0</span></div>
    </div>

    <div class="dashboard">
        <div class="stat-box">
            <h3>目前資金</h3>
            <p>$<span id="money">0</span></p>
        </div>
        <div class="stat-box">
            <h3>每秒被動收入 (GPS)</h3>
            <p>$<span id="gps">0</span></p>
        </div>
    </div>

    <div id="log-msg">店面營運中...</div>

    <div class="action-section">
        <button class="main-btn" id="click-btn">🧋 手動搖一杯飲料</button>
    </div>

    <div class="panel-title">🏪 基礎營運與基礎升級</div>
    <div id="shop-container">
        <div class="upgrade-item">
            <div class="upgrade-info">
                <h4>雇用工讀生 (<span id="staff-count">0</span>)</h4>
                <p>每秒自動賺 $1</p>
            </div>
            <button class="upgrade-btn" id="buy-staff">花費: $15</button>
        </div>
        <div class="upgrade-item">
            <div class="upgrade-info">
                <h4>升級配方：黑糖鮮奶 (<span id="recipe-level">0</span>)</h4>
                <p>每次「手動點擊」收益 +$5</p>
            </div>
            <button class="upgrade-btn" id="buy-recipe">花費: $50</button>
        </div>
        <div class="upgrade-item">
            <div class="upgrade-info">
                <h4>引進自動封口機 (<span id="machine-count">0</span>)</h4>
                <p>每秒自動賺 $15</p>
            </div>
            <button class="upgrade-btn" id="buy-machine">花費: $200</button>
        </div>

        <div class="panel-title" style="margin-top:20px; color:#b7791f;">✨ 高級企業擴張</div>
        <div class="upgrade-item premium">
            <div class="upgrade-info">
                <h4>聘請專業店長 (<span id="manager-count">0</span>)</h4>
                <p>打理店務，每秒暴賺 $120</p>
            </div>
            <button class="upgrade-btn" id="buy-manager">花費: $1500</button>
        </div>
        <div class="upgrade-item premium">
            <div class="upgrade-info">
                <h4>進駐信義區黃金店面 (<span id="shop-level">0</span>)</h4>
                <p>曝光度大增！【全店總被動收入直接乘 2】</p>
            </div>
            <button class="upgrade-btn" id="buy-shop">花費: $8000</button>
        </div>
    </div>
</div>

<script>
    /* --- 遊戲數據狀態 --- */
    let gameState = {
        money: 0,
        clickPower: 1,
        staffCount: 0,  staffCost: 15,
        recipeLevel: 0, recipeCost: 50,
        machineCount: 0, machineCost: 200,
        managerCount: 0, managerCost: 1500,
        shopLevel: 0,    shopCost: 8000,
        highScore: 0
    };

    if(localStorage.getItem('tea_high_score')) {
        gameState.highScore = parseInt(localStorage.getItem('tea_high_score'));
    }

    /* --- 獲取 DOM --- */
    const elMoney = document.getElementById('money');
    const elGps = document.getElementById('gps');
    const elLog = document.getElementById('log-msg');
    const elHighScore = document.getElementById('high-score');
    
    const elClickBtn = document.getElementById('click-btn');
    const elBuyStaff = document.getElementById('buy-staff');
    const elStaffCount = document.getElementById('staff-count');
    const elBuyRecipe = document.getElementById('buy-recipe');
    const elRecipeLevel = document.getElementById('recipe-level');
    const elBuyMachine = document.getElementById('buy-machine');
    const elMachineCount = document.getElementById('machine-count');
    const elBuyManager = document.getElementById('buy-manager');
    const elManagerCount = document.getElementById('manager-count');
    const elBuyShop = document.getElementById('buy-shop');
    const elShopLevel = document.getElementById('shop-level');

    /* --- 核心邏輯 --- */
    function calculateGPS() {
        let baseGps = (gameState.staffCount * 1) + (gameState.machineCount * 15) + (gameState.managerCount * 120);
        let multiplier = Math.pow(2, gameState.shopLevel); 
        return baseGps * multiplier;
    }

    function updateUI() {
        elMoney.innerText = Math.floor(gameState.money);
        elGps.innerText = calculateGPS();
        elHighScore.innerText = Math.floor(gameState.highScore);

        if (gameState.money > gameState.highScore) {
            gameState.highScore = gameState.money;
            localStorage.setItem('tea_high_score', gameState.highScore);
        }

        elStaffCount.innerText = gameState.staffCount;
        elBuyStaff.innerText = `花費: $${gameState.staffCost}`;
        elBuyStaff.disabled = gameState.money < gameState.staffCost;

        elRecipeLevel.innerText = gameState.recipeLevel;
        elBuyRecipe.innerText = `花費: $${gameState.recipeCost}`;
        elBuyRecipe.disabled = gameState.money < gameState.recipeCost;

        elMachineCount.innerText = gameState.machineCount;
        elBuyMachine.innerText = `花費: $${gameState.machineCost}`;
        elBuyMachine.disabled = gameState.money < gameState.machineCost;

        elManagerCount.innerText = gameState.managerCount;
        elBuyManager.innerText = `花費: $${gameState.managerCost}`;
        elBuyManager.disabled = gameState.money < gameState.managerCost;

        elShopLevel.innerText = gameState.shopLevel;
        elBuyShop.innerText = `花費: $${gameState.shopCost}`;
        elBuyShop.disabled = gameState.money < gameState.shopCost;
    }

    function showLog(text) { elLog.innerText = text; }

    /* --- 事件監聽 --- */
    elClickBtn.addEventListener('click', () => {
        gameState.money += gameState.clickPower;
        showLog(`🧋 賣出一杯飲料，賺了 $${gameState.clickPower}！`);
        updateUI();
    });

    elBuyStaff.addEventListener('click', () => {
        if (gameState.money >= gameState.staffCost) {
            gameState.money -= gameState.staffCost;
            gameState.staffCount++;
            gameState.staffCost = Math.round(gameState.staffCost * 1.15);
            showLog("🏪 成功雇用了一名工讀生！");
            updateUI();
        }
    });

    elBuyRecipe.addEventListener('click', () => {
        if (gameState.money >= gameState.recipeCost) {
            gameState.money -= gameState.recipeCost;
            gameState.recipeLevel++;
            gameState.clickPower += 5;
            gameState.recipeCost = Math.round(gameState.recipeCost * 1.6);
            showLog("✨ 配方升級！飲料單價上升！");
            updateUI();
        }
    });

    elBuyMachine.addEventListener('click', () => {
        if (gameState.money >= gameState.machineCost) {
            gameState.money -= gameState.machineCost;
            gameState.machineCount++;
            gameState.machineCost = Math.round(gameState.machineCost * 1.25);
            showLog("🤖 引進自動封口機！效率提升！");
            updateUI();
        }
    });

    elBuyManager.addEventListener('click', () => {
        if (gameState.money >= gameState.managerCost) {
            gameState.money -= gameState.managerCost;
            gameState.managerCount++;
            gameState.managerCost = Math.round(gameState.managerCost * 1.3);
            showLog("💼 聘請了專業店長！現在你基本可以躺著數錢了。");
            updateUI();
        }
    });

    elBuyShop.addEventListener('click', () => {
        if (gameState.money >= gameState.shopCost) {
            gameState.money -= gameState.shopCost;
            gameState.shopLevel++;
            gameState.shopCost = Math.round(gameState.shopCost * 2.5);
            showLog("🏢 成功進駐信義區黃金地段！全店營業額翻倍！");
            updateUI();
        }
    });

    window.resetHighScore = function() {
        if(confirm("確定要清除最高紀錄嗎？")) {
            gameState.highScore = 0;
            localStorage.removeItem('tea_high_score');
            updateUI();
        }
    }

    /* --- 遊戲主循環 --- */
    setInterval(() => {
        let gps = calculateGPS();
        if (gps > 0) {
            gameState.money += gps / 10;
            updateUI();
        }
    }, 100);

    setInterval(updateUI, 200);
    updateUI();
</script>

</body>
</html>
